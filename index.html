<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Octopus Feed Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; color: #333; }

  header { background: #333; color: white; padding: 20px; text-align: center; }
  header h1 { font-size: 28px; }

  main { max-width: 600px; margin: 30px auto; padding: 20px; }

  .calc-box { background: white; padding: 20px; border-radius: 8px; }
  
  label { display: block; margin: 15px 0 5px; font-weight: bold; }
  input { padding: 10px; font-size: 16px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
  button { background: #333; color: white; padding: 10px 20px; border: none; font-size: 16px; cursor: pointer; margin-left: 10px; border-radius: 4px; }
  button:hover { background: #555; }

  .results { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; }
  .results h3 { margin-bottom: 15px; }

  table { width: 100%; border-collapse: collapse; }
  td { padding: 10px; border-bottom: 1px solid #ddd; }
  td:last-child { text-align: right; font-weight: bold; }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Octopus Feed Calculator</h1>
</header>

<main>
  <div class="calc-box">
    <label for="weight">Octopus weight (kg):</label>
    <input type="number" id="weight" min="0" step="0.1" placeholder="Enter weight">
    <button onclick="calculate()">Calculate</button>

    <div id="result" class="hidden results">
      <h3>Weekly Feeding Requirements</h3>
      <table>
        <tr><td>Daily energy required</td><td id="dailyKcal"></td></tr>
        <tr><td>Weekly energy required</td><td id="weeklyKcal"></td></tr>
        <tr><td>Total daily feed</td><td id="dailyFeed"></td></tr>
        <tr><td>Total weekly feed</td><td id="weeklyFeed"></td></tr>
        <tr><td>Crab per week (70%)</td><td id="crab"></td></tr>
        <tr><td>Bivalve per week (20%)</td><td id="bivalve"></td></tr>
        <tr><td>White fish per week (10%)</td><td id="fish"></td></tr>
      </table>
    </div>
  </div>
</main>

<script>
function calculate() {
  const w = parseFloat(document.getElementById('weight').value);
  if (!w || w <= 0) {
    alert('Please enter a valid weight.');
    return;
  }

  const dailyKcal = w * 12.69;
  const weeklyKcal = dailyKcal * 7;
  const dailyFeed = dailyKcal / 0.968;
  const weeklyFeed = weeklyKcal / 0.968;
  const crab = weeklyFeed * 0.70;
  const bivalve = weeklyFeed * 0.20;
  const fish = weeklyFeed * 0.10;

  document.getElementById('dailyKcal').textContent = dailyKcal.toFixed(1) + ' kcal';
  document.getElementById('weeklyKcal').textContent = weeklyKcal.toFixed(1) + ' kcal';
  document.getElementById('dailyFeed').textContent = dailyFeed.toFixed(1) + ' g';
  document.getElementById('weeklyFeed').textContent = weeklyFeed.toFixed(1) + ' g';
  document.getElementById('crab').textContent = crab.toFixed(1) + ' g';
  document.getElementById('bivalve').textContent = bivalve.toFixed(1) + ' g';
  document.getElementById('fish').textContent = fish.toFixed(1) + ' g';

  document.getElementById('result').classList.remove('hidden');
}
</script>

</body>
</html>
